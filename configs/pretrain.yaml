model:
  architecture: google/gemma-3-1b          # config only, random init
  from_scratch: true

tokenizer:
  path: tokenizer/selfies_vocab.json       # built by smiles_to_selfies.py
  max_length: 256

data:
  train_path: data/processed/pretrain_train.jsonl
  val_path: data/processed/pretrain_val.jsonl

training:
  output_dir: checkpoints/pretrain
  num_train_epochs: 10
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 4
  learning_rate: 0.0003
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  fp16: false
  bf16: true
  logging_steps: 100
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
  dataloader_num_workers: 4
  report_to: wandb
  run_name: peptide-dpt-pretrain
