model:
  checkpoint: checkpoints/finetune/best

tokenizer:
  path: tokenizer/selfies_vocab.json

reward:
  weights:
    docking: 0.60
    sa_score: 0.25
    diversity: 0.15
  docking:
    receptor_pdb: docking/8BOW_receptor.pdb
    center_x: null
    center_y: null
    center_z: null
    box_size: 22.0
    exhaustiveness: 8
    gnina_bin: gnina
  diversity:
    reference_smiles_path: data/processed/psma_known_smiles.txt
    fingerprint: morgan
    radius: 2
    n_bits: 2048

grpo:
  output_dir: checkpoints/grpo
  num_train_epochs: 3
  # GRPO generates rollouts per prompt — larger group_size = better gradient estimate
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4      # effective = 8 * 8 * 4 = 256 rollouts per step
  learning_rate: 1e-5
  lr_scheduler_type: constant_with_warmup
  warmup_steps: 50
  bf16: true
  group_size: 16                      # G: samples per prompt (↑ from 8, B200 has headroom)
  kl_coef: 0.05
  clip_range: 0.2
  max_new_tokens: 200
  temperature: 1.0
  logging_steps: 5
  save_steps: 50
  dataloader_num_workers: 4
  report_to: wandb
  run_name: peptide-dpt-grpo-b200
