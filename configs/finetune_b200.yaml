model:
  checkpoint: checkpoints/pretrain/best

tokenizer:
  path: tokenizer/selfies_vocab.json

data:
  train_path: data/processed/psma_sft_train.jsonl
  val_path: data/processed/psma_sft_val.jsonl

training:
  output_dir: checkpoints/finetune
  num_train_epochs: 50
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2       # effective batch = 16 * 8 * 2 = 256
  learning_rate: 0.00005
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: true
  logging_steps: 5
  eval_strategy: steps
  eval_steps: 10
  save_strategy: steps
  save_steps: 10
  save_total_limit: 5
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  early_stopping_patience: 5
  dataloader_num_workers: 8
  deepspeed: ds_configs/zero2.json
  report_to: wandb
  run_name: peptide-dpt-finetune-psma-b200
